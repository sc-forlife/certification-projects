<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Drum Machine</title>
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="drum-machine">
      <div id="pad-bank">
        <div class="drum-pad" id="heater1">
          Q
          <audio class="clip" id="Q" title="Heater 1">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/Heater-1.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
        <div class="drum-pad" id="heater2">
          W
          <audio class="clip" id="W" title="Heater 2">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/Heater-2.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
        <div class="drum-pad" id="heater3">
          E
          <audio class="clip" id="E" title="Heater 3">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/Heater-3.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
        <div class="drum-pad" id="heater4">
          A
          <audio class="clip" id="A" title="Heater 4">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/Heater-4_1.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
        <div class="drum-pad" id="heater6">
          S
          <audio class="clip" id="S" title="Clap">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/Heater-6.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
        <div class="drum-pad" id="open-hh">
          D
          <audio class="clip" id="D" title="Open-HH">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/Dsc_Oh.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
        <div class="drum-pad" id="kick-n'hat">
          Z
          <audio class="clip" id="Z" title="Kick-n'-Hat">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/Kick_n_Hat.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
        <div class="drum-pad" id="kick">
          X
          <audio class="clip" id="X" title="Kick">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/RP4_KICK_1.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
        <div class="drum-pad" id="closed-hh">
          C
          <audio class="clip" id="C" title="Closed-HH">
            <source
              src="https://cdn.freecodecamp.org/curriculum/drum/Cev_H2.mp3"
              type="audio/mpeg"
            />
          </audio>
        </div>
      </div>
      <p id="display"></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
