<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Drum Machine</title>
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="drum-machine">
      <div id="pad-bank">
        <button class="drum-pad KeyQ" id="heater1">
          Q
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-1.mp3"
            class="clip"
            id="Q"
            title="Heater 1"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
        <button class="drum-pad KeyW" id="heater2">
          W
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-2.mp3"
            class="clip"
            id="W"
            title="Heater 2"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
        <button class="drum-pad KeyE" id="heater3">
          E
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-3.mp3"
            class="clip"
            id="E"
            title="Heater 3"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
        <button class="drum-pad KeyA" id="heater4">
          A
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-4_1.mp3"
            class="clip"
            id="A"
            title="Heater 4"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
        <button class="drum-pad KeyS" id="heater6">
          S
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-6.mp3"
            class="clip"
            id="S"
            title="Clap"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
        <button class="drum-pad KeyD" id="open-hh">
          D
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/Dsc_Oh.mp3"
            class="clip"
            id="D"
            title="Open-HH"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
        <button class="drum-pad KeyZ" id="kick-n'hat">
          Z
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/Kick_n_Hat.mp3"
            class="clip"
            id="Z"
            title="Kick-n'-Hat"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
        <button class="drum-pad KeyX" id="kick">
          X
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/RP4_KICK_1.mp3"
            class="clip"
            id="X"
            title="Kick"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
        <button class="drum-pad KeyC" id="closed-hh">
          C
          <audio
            src="https://cdn.freecodecamp.org/curriculum/drum/Cev_H2.mp3"
            class="clip"
            id="C"
            title="Closed-HH"
          >
            <source type="audio/mpeg" />
          </audio>
        </button>
      </div>
      <p id="display"></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
